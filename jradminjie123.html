<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Catalog admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --linen:#ffffff; --walnut:#403a34; --charcoal:#333333; --slate:#555555;
      --line:#403a34; --line-soft:rgba(64,58,52,.20); --ok:#1da851; --err:#b3261e;
      --sans:'Inter', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }
    * { box-sizing:border-box; }
    body {
      font-family:var(--sans); font-weight:400; color:var(--walnut); background:var(--linen);
      -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; line-height:1.5;
      margin:0; padding:clamp(30px,6vw,56px); max-width:720px;
    }
    h1 {
      font-size:20px; font-weight:600; text-transform:uppercase; letter-spacing:.14em;
      padding-bottom:18px; margin-bottom:6px; border-bottom:1px solid var(--line);
    }
    h2 { font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:.16em; color:var(--slate); margin:28px 0 12px; }
    label { display:block; font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:.14em; color:var(--slate); margin:18px 0 7px; }
    input, select { font:inherit; color:var(--walnut); background:var(--linen); padding:11px 13px; border:1px solid var(--line-soft); }
    input:focus, select:focus { outline:none; border-color:var(--walnut); }
    code { font-family:ui-monospace, 'SFMono-Regular', Menlo, monospace; font-size:.92em; }
    button {
      font:inherit; cursor:pointer; padding:11px 22px; border:1px solid var(--line);
      background:var(--walnut); color:var(--linen); letter-spacing:.02em; transition:background .15s;
    }
    button:hover { background:#2e2925; }
    .status { margin:12px 0; min-height:1.2em; font-size:13px; color:var(--slate); }
    .status.err { color:var(--err); } .status.ok { color:var(--ok); }
    .row { display:flex; gap:10px; align-items:center; margin:12px 0; flex-wrap:wrap; }
    label + .row, label + #preview { margin-top:7px; }
    [hidden] { display:none !important; }
    .tabs { gap:26px; border-bottom:1px solid var(--line-soft); margin:24px 0; }
    .tabs button { border:none; border-bottom:2px solid transparent; background:none; color:var(--slate); padding:10px 2px; font-size:12px; text-transform:uppercase; letter-spacing:.12em; }
    .tabs button:hover { background:none; color:var(--walnut); }
    .tabs button.on { border-bottom-color:var(--walnut); color:var(--walnut); font-weight:600; }
    #tok-clear { background:none; color:var(--slate); border:1px solid var(--line-soft); padding:5px 11px; font-size:12px; letter-spacing:.04em; margin-left:10px; }
    #tok-clear:hover { background:none; color:var(--walnut); border-color:var(--walnut); }
    .reveal { background:none; color:var(--slate); border:1px solid var(--line-soft); padding:5px 12px; font-size:12px; letter-spacing:.04em; }
    .reveal:hover { background:none; color:var(--walnut); border-color:var(--walnut); }
    #preview canvas { max-width:220px; height:auto; border:1px solid var(--line-soft); margin-top:10px; }
    .prow { display:flex; gap:14px; align-items:center; padding:12px 0; border-bottom:1px solid var(--line-soft); }
    .prow.is-hidden { opacity:.5; }
    .pthumb { width:56px; height:56px; object-fit:cover; border:1px solid var(--line-soft); }
    .pmeta { flex:1; } .pn { font-size:14px; color:var(--walnut); }
    .pc { font-size:11px; color:var(--slate); text-transform:uppercase; letter-spacing:.1em; margin-top:3px; }
    .badge { font-size:10px; text-transform:uppercase; letter-spacing:.12em; color:var(--err); }
    .rowbtn { background:none; color:var(--walnut); border:1px solid var(--line-soft); padding:6px 13px; font-size:12px; letter-spacing:.04em; }
    .rowbtn:hover { background:none; border-color:var(--walnut); }
    .rowbtn.del { color:var(--err); border-color:rgba(179,38,30,.32); }
    .rowbtn.del:hover { background:none; border-color:var(--err); }
  </style>
</head>
<body>
  <h1>Catalog admin</h1>

  <form id="gate-form">
    <div id="gate">
      <label for="pass">Passphrase</label>
      <div class="row"><input type="password" id="pass" autocomplete="off"><button type="button" id="pass-toggle" class="reveal" aria-pressed="false">Show</button><button type="submit">Unlock</button></div>
      <div class="status err" id="gate-err"></div>
    </div>
  </form>

  <div id="app" hidden>
    <div class="status ok" id="unlock-note" hidden>Unlocked.</div>

    <div id="token-setup" hidden>
      <h2>GitHub token</h2>
      <p style="font-size:13px;color:var(--slate)">Paste a token with contents read/write on <code>JianRanBuildingMaterials</code>. Stored only in this browser.</p>
      <form id="token-form">
        <div class="row"><input type="password" id="token-input" placeholder="ghp_…" autocomplete="off" style="flex:1"><button type="submit">Save</button></div>
      </form>
      <div class="status err" id="token-status"></div>
    </div>

    <div id="tools" hidden>
      <div class="status" id="token-badge"></div>
      <div class="tabs row">
        <button type="button" id="tab-btn-add" class="on">Add</button>
        <button type="button" id="tab-btn-manage">Manage</button>
      </div>

      <div id="tab-add">
        <form id="add-form">
          <label for="f-category">Category</label>
          <select id="f-category"></select>
          <label for="f-photo">Photo</label>
          <input type="file" id="f-photo" accept="image/*">
          <div id="preview"></div>
          <label for="f-caption">Caption (optional)</label>
          <input type="text" id="f-caption" placeholder="e.g. Matte black sliding door">
          <div class="row"><button type="submit" id="add-submit">Publish</button></div>
        </form>
        <div class="status" id="add-status"></div>
      </div>

      <div id="tab-manage" hidden>
        <div class="row"><input type="text" id="search" placeholder="Search caption, category…" style="flex:1"></div>
        <div class="status" id="list-count"></div>
        <div id="prod-list"></div>
        <div id="deleted-wrap" hidden>
          <h2>Deleted entries <span id="deleted-count"></span></h2>
          <div id="deleted-list"></div>
        </div>
        <div class="status" id="manage-status"></div>
      </div>
    </div>
  </div>

  <script src="assets/js/catalog-seed.js"></script>
  <script src="assets/js/catalog-admin.js"></script>
  <script src="assets/js/jradminjie123.js"></script>
</body>
</html>
